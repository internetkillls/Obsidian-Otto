services:
  postgres:
    image: postgres:16-alpine
    container_name: ob-otto-postgres
    environment:
      POSTGRES_DB: otto
      POSTGRES_USER: otto
      POSTGRES_PASSWORD: otto
    ports:
      - "54329:5432"
    volumes:
      - ./external/postgres:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    container_name: ob-otto-adminer
    ports:
      - "18080:8080"
    depends_on:
      - postgres

  chromadb:
    image: chromadb/chroma:latest
    container_name: ob-otto-chromadb
    ports:
      - "18000:8000"
    volumes:
      - ./external/chroma_store:/chroma/chroma
    profiles: ["vector"]

  otto-indexer:
    image: python:3.12-slim
    container_name: ob-otto-indexer
    working_dir: /app
    command: ["sleep", "infinity"]
    volumes:
      - ./:/app
    profiles: ["worker"]

  obsidian-mcp:
    build:
      context: ./packages/obsidian-mcp
      dockerfile: Dockerfile
    container_name: ob-otto-obsidian-mcp
    environment:
      OBSIDIAN_VAULT_PATH: ${OBSIDIAN_VAULT_PATH:-/vault}
    volumes:
      - ${OBSIDIAN_VAULT_HOST:-.}/vault:/vault:ro
    profiles: ["mcp"]

  obsidian-cli-mcp:
    build:
      context: ./packages/obsidian-cli-mcp
      dockerfile: Dockerfile
    container_name: ob-otto-obsidian-cli-mcp
    environment:
      OBSIDIAN_VAULT_PATH: ${OBSIDIAN_VAULT_PATH:-/vault}
      OBSIDIAN_CLI_PATH: ${OBSIDIAN_CLI_PATH:-}
    volumes:
      - ${OBSIDIAN_VAULT_HOST:-.}/vault:/vault:ro
    profiles: ["mcp"]
