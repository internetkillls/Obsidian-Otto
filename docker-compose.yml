services:
  postgres:
    image: postgres:16-alpine
    container_name: ob-otto-postgres
    environment:
      POSTGRES_DB: otto
      POSTGRES_USER: otto
      POSTGRES_PASSWORD: otto
    ports:
      - "54329:5432"
    volumes:
      - ./external/postgres:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    container_name: ob-otto-adminer
    ports:
      - "18080:8080"
    depends_on:
      - postgres

  chromadb:
    image: chromadb/chroma:latest
    container_name: ob-otto-chromadb
    ports:
      - "18000:8000"
    volumes:
      - ./external/chroma_store:/chroma/chroma
    profiles: ["vector"]

  otto-indexer:
    image: python:3.12-slim
    container_name: ob-otto-indexer
    working_dir: /app
    command: ["sleep", "infinity"]
    volumes:
      - ./:/app
    profiles: ["worker"]

  # MCP servers run in foreground stdio mode (stdin_open + tty, NOT detached).
  # OpenClaw connects via launch-mcp.bat (recommended) or docker compose run --rm.
  # Vault path: OBSIDIAN_VAULT_PATH is the IN-CONTAINER mount (/vault).
  # OBSIDIAN_VAULT_HOST is the host path; compose mounts host->container.
  obsidian-mcp:
    build:
      context: ./packages/obsidian-mcp
      dockerfile: Dockerfile
    container_name: ob-otto-obsidian-mcp
    environment:
      OBSIDIAN_VAULT_PATH: ${OBSIDIAN_VAULT_PATH:-/vault}
    volumes:
      - ${OBSIDIAN_VAULT_HOST:-.}:${OBSIDIAN_VAULT_PATH:-/vault}:ro
    stdin_open: true
    tty: true
    profiles: ["mcp"]
    # NOTE: obsidian_write_note requires read-write mount.
    # Use profile "mcp-rw" or override volumes manually for write access.

  obsidian-scripts-mcp:
    build:
      context: ./packages/obsidian-scripts-mcp
      dockerfile: Dockerfile
    container_name: ob-otto-obsidian-scripts-mcp
    working_dir: /otto
    environment:
      OTTO_REPO_PATH: /otto
      OTTO_SCRIPTS_PATH: /otto/scripts/manage
      PYTHONPATH: /otto/src
    # Mount Otto repo (.) to /otto so scripts/manage/*.py are accessible
    volumes:
      - .:/otto:ro
    stdin_open: true
    tty: true
    profiles: ["mcp"]
