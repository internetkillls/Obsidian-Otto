[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "otto-obsidian-scripts-mcp"
version = "0.1.0"
description = "Otto Scripts MCP server — wraps Otto Python scripts (scripts/manage/*.py) as MCP tools"
requires-python = ">=3.11"
dependencies = [
    "mcp[cli]>=1.0.0",
]

[project.scripts]
otto-obsidian-scripts-mcp = "otto_obsidian_scripts_mcp.server:main"
