docker:
  enabled: false
  compose_file: docker-compose.yml
  services:
    - postgres
    - adminer
    - chromadb
    - otto-indexer
    - obsidian-mcp
    - obsidian-cli-mcp
  mcp:
    obsidian:
      vault_path_env: OBSIDIAN_VAULT_PATH
      cli_path_env: OBSIDIAN_CLI_PATH
    profiles:
      - mcp
    connection: stdio
