docker:
  enabled: false
  compose_file: docker-compose.yml
  services:
    - postgres
    - adminer
    - chromadb
    - otto-indexer
    - obsidian-mcp
    - obsidian-scripts-mcp
  mcp:
    obsidian:
      vault_path_env: OBSIDIAN_VAULT_PATH
    scripts:
      repo_path_env: OTTO_REPO_PATH
      scripts_path_env: OTTO_SCRIPTS_PATH
    profiles:
      - mcp
    connection: stdio
